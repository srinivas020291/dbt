version: 2


sources:
    - name: hr
      database: source1
      schema: hr
      tables:
        - name: employees
          loaded_at_field: load_time
          freshness:
            warn_after: { count: 12 , period: hour }
            error_after: { count: 24, period: hour }
         
          columns:
            - name: employee_id
              tests:
                - not_null
                - unique
        - name: departments
        - name: countries
        - name: jobs
        - name: job_history
        - name: locations
        - name: regions
        - name: salary
